# Runner Packing Rules
#
# - backend:   (Required) The accelerated backend to pack for,
#              used to select the packing rules and Dockerfile below `pack` directory.
# - services:  (Required) The inference service to pack for,
#              used to select the Docker build phase described in `pack/${backend}/Dockerfile`.
# - platforms: (Optional) The platforms to build for,
#              used to select the Docker Linux build platforms.
#              Default to `linux/amd64` and `linux/arm64`.
# - args:      (Optional) The build arguments to pass to the Docker build,
#              used to override the default build arguments in `pack/${backend}/Dockerfile`.

rules:

  #
  # Ascend CANN
  #

  ## Ascend CANN 8.5.0, using CANN Kernel for A3.
  ##
  - backend: "cann"
    services:
      - "mindie"
      - "vllm"
    args:
      - "CANN_VERSION=8.5.0"
      - "CANN_ARCHS=a3"
  - backend: "cann"
    services:
      - "sglang"
    platforms:
      - "linux/arm64"
    args:
      - "CANN_VERSION=8.5.0"
      - "CANN_ARCHS=a3"
  ## Ascend CANN 8.5.0, using CANN Kernel for 910B.
  ##
  - backend: "cann"
    services:
      - "mindie"
      - "vllm"
    args:
      - "CANN_VERSION=8.5.0"
      - "CANN_ARCHS=910b"
  - backend: "cann"
    services:
      - "sglang"
    platforms:
      - "linux/arm64"
    args:
      - "CANN_VERSION=8.5.0"
      - "CANN_ARCHS=910b"
  ## Ascend CANN 8.5.0, using CANN Kernel for 310P.
  ##
  - backend: "cann"
    services:
      - "mindie"
      - "vllm"
    args:
      - "CANN_VERSION=8.5.0"
      - "CANN_ARCHS=310p"

  #
  # AMD ROCm
  #

  ## AMD ROCm 7.1.1
  ##
  - backend: "rocm"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "ROCM_VERSION=7.1.1"
      - "VLLM_TORCH_SOURCE=radeon"
  ## AMD ROCm 7.0.2
  ##
  - backend: "rocm"
    services:
      - "sglang"
    platforms:
      - "linux/amd64"
    args:
      - "ROCM_VERSION=7.0.2"
      - "VLLM_TORCH_SOURCE=radeon"
      - "SGLANG_BASE_IMAGE=gpustack/runner:rocm7.0-vllm0.15.1"
      - "SGLANG_BUILD_BASE_IMAGE=gpustack/runner:rocm7.0-vllm0.15.1"

  #
  # NVIDIA CUDA
  #

  ## NVIDIA CUDA 12.9.1
  ##
  - backend: "cuda"
    services:
      - "vllm"
      - "sglang"
    args:
      - "CUDA_VERSION=12.9.1"
      - "SGLANG_BASE_IMAGE=gpustack/runner:cuda12.9-vllm0.15.1"
      - "SGLANG_BUILD_BASE_IMAGE=gpustack/runner:cuda12.9-vllm0.15.1"
  ## NVIDIA CUDA 12.8.1
  ##
  - backend: "cuda"
    services:
      - "voxbox"
      - "vllm"
      - "sglang"
    args:
      - "CUDA_VERSION=12.8.1"
      - "SGLANG_BASE_IMAGE=gpustack/runner:cuda12.8-vllm0.15.1"
      - "SGLANG_BUILD_BASE_IMAGE=gpustack/runner:cuda12.8-vllm0.15.1"

  #
  # Iluvatar CoreX
  #
  ##
  ## Use pack flow's arguments to override the default COREX version and version extra,
  ## which are used in `pack/corex/Dockerfile` to construct the image tags and build arguments.
  ##
  - backend: "corex"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "COREX_VERSION="
      - "VLLM_VERSION="

  #
  # Hygon DTK
  #
  ##
  ## Use pack flow's arguments to override the default DTK version and version extra,
  ## which are used in `pack/dtk/Dockerfile` to construct the image tags and build arguments.
  ##
  - backend: "dtk"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "DTK_VERSION="
      - "VLLM_VERSION="

  #
  # T-Head HGGC
  #
  ##
  ## Use pack flow's arguments to override the default HGGC version and version extra,
  ## which are used in `pack/hggc/Dockerfile` to construct the image tags and build arguments.
  ##
  ## Get HGGC version via `VERSION=$(cat /usr/local/PPU_SDK/include/hggc.h | grep HGGC_VERSION | grep define | cut -d' ' -f3); echo "$(( ${VERSION} / 1000 )).$(( ${VERSION} % 1000 / 10 )).$(( ${VERSION} % 10 ))"`
  - backend: "hggc"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "HGGC_VERSION="
      - "HGGC_VERSION_EXTRA="
      - "VLLM_VERSION="

  #
  # MateX MACA
  #
  ##
  ## Use pack flow's arguments to override the default MACA version and version extra,
  ## which are used in `pack/maca/Dockerfile` to construct the image tags and build arguments.
  ##
  - backend: "maca"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "MACA_VERSION="
      - "MACA_VERSION_EXTRA="
      - "VLLM_VERSION="

  #
  # MThreads MUSA
  #
  ##
  ## Use pack flow's arguments to override the default MUSA version and version extra,
  ## which are used in `pack/musa/Dockerfile` to construct the image tags and build arguments.
  ##
  - backend: "musa"
    services:
      - "sglang"
    platforms:
      - "linux/amd64"
    args:
      - "MUSA_VERSION="
      - "MUSA_VERSION_EXTRA="
      - "VLLM_VERSION="
