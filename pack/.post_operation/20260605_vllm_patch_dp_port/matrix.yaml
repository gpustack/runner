rules:

  #
  # NVIDIA CUDA
  #
  # Re-tag already-released vLLM images to fix the wrong_dp_ray patch
  # (_next_port = port  ->  _next_port = port + 1).
  #

  ## CUDA 13.0 - vLLM 0.21.0
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=13.0"
      - "VLLM_VERSION=0.21.0"
  ## CUDA 13.0 - vLLM 0.20.2
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=13.0"
      - "VLLM_VERSION=0.20.2"
  ## CUDA 13.0 - vLLM 0.19.1
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=13.0"
      - "VLLM_VERSION=0.19.1"
  ## CUDA 13.0 - vLLM 0.18.1
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=13.0"
      - "VLLM_VERSION=0.18.1"
  ## CUDA 12.9 - vLLM 0.21.0
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=12.9"
      - "VLLM_VERSION=0.21.0"
  ## CUDA 12.9 - vLLM 0.20.2
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=12.9"
      - "VLLM_VERSION=0.20.2"
  ## CUDA 12.9 - vLLM 0.19.1
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=12.9"
      - "VLLM_VERSION=0.19.1"
  ## CUDA 12.9 - vLLM 0.18.1
  - backend: "cuda"
    services:
      - "vllm"
    args:
      - "CUDA_VERSION=12.9"
      - "VLLM_VERSION=0.18.1"

  #
  # AMD ROCm
  #

  ## ROCm 7.2 - vLLM 0.21.0
  - backend: "rocm"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "ROCM_VERSION=7.2"
      - "VLLM_VERSION=0.21.0"
  ## ROCm 7.2 - vLLM 0.20.2
  - backend: "rocm"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "ROCM_VERSION=7.2"
      - "VLLM_VERSION=0.20.2"
  ## ROCm 7.2 - vLLM 0.19.1
  - backend: "rocm"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "ROCM_VERSION=7.2"
      - "VLLM_VERSION=0.19.1"
  ## ROCm 7.0 - vLLM 0.18.1
  - backend: "rocm"
    services:
      - "vllm"
    platforms:
      - "linux/amd64"
    args:
      - "ROCM_VERSION=7.0"
      - "VLLM_VERSION=0.18.1"

  #
  # Ascend CANN
  #

  ## CANN 8.5 (A3) - vLLM 0.18.0
  - backend: "cann"
    services:
      - "vllm"
    args:
      - "CANN_VERSION=8.5"
      - "CANN_ARCHS=a3"
      - "VLLM_VERSION=0.18.0"
  ## CANN 8.5 (910B) - vLLM 0.18.0
  - backend: "cann"
    services:
      - "vllm"
    args:
      - "CANN_VERSION=8.5"
      - "CANN_ARCHS=910b"
      - "VLLM_VERSION=0.18.0"
  ## CANN 8.5 (310P) - vLLM 0.18.0
  - backend: "cann"
    services:
      - "vllm"
    args:
      - "CANN_VERSION=8.5"
      - "CANN_ARCHS=310p"
      - "VLLM_VERSION=0.18.0"
